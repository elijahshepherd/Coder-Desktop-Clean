name: Publish GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release assets
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version from tag
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $package = Get-Content -Raw -LiteralPath package.json | ConvertFrom-Json
          $package.version = $version
          $package | ConvertTo-Json -Depth 10 | Set-Content package.json

      - name: Build Windows downloads
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}".TrimStart("v")
          $versionPrefix = "v$version"
          npm run release:current
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          $downloads = "downloads\$versionPrefix\Windows"
          $releaseUpload = "release-upload"
          if (Test-Path -LiteralPath $releaseUpload) {
            Remove-Item -LiteralPath $releaseUpload -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $releaseUpload | Out-Null

          Get-ChildItem -LiteralPath $downloads -File |
            Where-Object {
              ($_.Extension -in @(".exe", ".zip", ".blockmap") -and $_.Name -match "-win-") -or
              $_.Name -eq "Coder-Desktop-$version-windows-trust-report.txt"
            } |
            ForEach-Object {
              if ($_.Extension -eq ".exe" -and $_.Length -lt 10MB) {
                throw "Windows executable is too small to be a real application download: $($_.FullName)"
              }
              Copy-Item -LiteralPath $_.FullName -Destination $releaseUpload
            }

          Get-ChildItem -LiteralPath $releaseUpload -File | Format-Table Name, Length
      - name: Upload Windows assets
        uses: actions/upload-artifact@v4
        with:
          name: coder-desktop-windows-release-assets
          path: release-upload/*
          if-no-files-found: error

  build-macos:
    name: Build macOS release assets
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

        - name: Sync version from tag
          shell: bash
          run: |
            version="${GITHUB_REF_NAME#v}"
            npm pkg set version="$version"

        - name: Build macOS ZIPs
        run: |
          version="${GITHUB_REF_NAME#v}"
          versionPrefix="v$version"
          rm -rf release-upload
          npm run build
          npm exec electron-builder -- --mac zip --x64 --arm64
          mkdir -p "downloads/$versionPrefix/macOS"
          mkdir -p release-upload
          cp "release/Coder-Desktop-$version-mac-x64.zip" "downloads/$versionPrefix/macOS/"
          cp "release/Coder-Desktop-$version-mac-arm64.zip" "downloads/$versionPrefix/macOS/"
          cp "downloads/$versionPrefix/macOS/Coder-Desktop-$version-mac-x64.zip" release-upload/
          cp "downloads/$versionPrefix/macOS/Coder-Desktop-$version-mac-arm64.zip" release-upload/

      - name: Upload macOS assets
        uses: actions/upload-artifact@v4
        with:
          name: coder-desktop-macos-release-assets
          path: release-upload/*
          if-no-files-found: error

  publish:
    name: Publish release assets
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download built release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release folder and manifest
        shell: bash
        run: |
          set -euxo pipefail
          version="${GITHUB_REF_NAME#v}"
          versionPrefix="v$version"
          rm -rf "downloads/$versionPrefix"
          mkdir -p "downloads/$versionPrefix/Windows"
          mkdir -p "downloads/$versionPrefix/macOS"

          is_lfs_pointer() {
            local file="$1"
            local size
            size="$(wc -c < "$file")"
            [ "$size" -le 1024 ] && head -n 1 "$file" | grep -q '^version https://git-lfs.github.com/spec/v1'
          }

          find release-assets -type f -print
          while IFS= read -r file; do
            case "$file" in
              *.zip|*.exe|*.dmg|*.AppImage|*.blockmap|*windows-trust-report.txt)
                if is_lfs_pointer "$file"; then
                  echo "Skipping Git LFS pointer artifact: $file"
                  continue
                fi
                # Determine platform from filename and copy to appropriate folder
                if [[ "$file" == *"-win-"* ]]; then
                  cp -v "$file" "downloads/$versionPrefix/Windows/"
                elif [[ "$file" == *"-mac-"* ]]; then
                  cp -v "$file" "downloads/$versionPrefix/macOS/"
                else
                  cp -v "$file" "downloads/$versionPrefix/"
                fi
                ;;
            esac
          done < <(find release-assets -type f)

          release_file_count="$(find "downloads/$versionPrefix" -maxdepth 2 -type f \( -name "*.zip" -o -name "*.exe" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.blockmap" \) | wc -l)"
          test "$release_file_count" -gt 0
          ls -lh "downloads/$versionPrefix"
          node scripts/write-download-manifest.mjs
          ls -lh "downloads/$versionPrefix"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
                  version="${GITHUB_REF_NAME#v}"
                  versionPrefix="v$version"
                  upload_args=()
                  # Collect all artifacts from platform folders
                  for file in "downloads/$versionPrefix/Windows"/* "downloads/$versionPrefix/macOS"/*; do
                    if [ -f "$file" ]; then
                      upload_args+=("$file")
                    fi
                  done

                  # Delete existing release if it exists (to ensure clean update with new notes)
                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                    gh release delete "$GITHUB_REF_NAME" --yes
                  fi

                  # Create fresh release with updated notes
                  gh release create "$GITHUB_REF_NAME" "${upload_args[@]}" \
                    --title "Coder Desktop $version" \
                    --notes-file "docs/releases/$version.md" \
                    --latest
