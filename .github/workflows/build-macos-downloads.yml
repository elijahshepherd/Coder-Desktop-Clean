name: Build macOS Downloads

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "electron-builder.yml"
      - "index.html"
      - "package-lock.json"
      - "package.json"
      - "scripts/build-macos-downloads.sh"
      - "scripts/release-version.ps1"
      - "scripts/write-download-manifest.mjs"
      - "src/**"
      - "tsconfig*.json"
      - "vite.config.mts"
      - "vitest.config.mts"

permissions:
  contents: write

jobs:
  build-macos-downloads:
    name: Build macOS ZIP downloads
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Setup Git LFS
        run: git lfs install

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS downloads
        run: bash scripts/build-macos-downloads.sh

      - name: Resolve package version
        id: package
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Keep macOS downloads as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coder-desktop-${{ steps.package.outputs.version }}-macos-downloads
          path: |
                  downloads/v${{ steps.package.outputs.version }}/macOS/Coder-Desktop-${{ steps.package.outputs.version }}-mac-*.zip
                  downloads/v${{ steps.package.outputs.version }}/manifest.json
          if-no-files-found: error

      - name: Upload macOS downloads to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.package.outputs.version }}"
          tag="v$version"
          if gh release view "$tag" >/dev/null 2>&1; then
                  gh release upload "$tag" "downloads/v$version/macOS/Coder-Desktop-$version-mac-*.zip" "downloads/v$version/manifest.json" --clobber
          else
            echo "Release $tag does not exist yet; skipping release upload."
          fi

      - name: Commit macOS downloads
        run: |
          version=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git lfs track "downloads/**/*.zip"
                git add .gitattributes "downloads/v$version"
          if git diff --cached --quiet; then
            echo "No macOS download changes to commit."
          else
            git commit -m "Refresh macOS $version downloads"
            git push
          fi
