name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels:
  - type: feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What should become easier or better?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like Coder Desktop to do?
    validations:
      required: true
